<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    header { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 2.5rem 1rem 4rem; text-align: center; color: #fff; }
    header h1 { font-size: 2.2rem; font-weight: 700; }
    .card { width: min(640px, calc(100% - 2rem)); background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(102,126,234,.18); margin-top: -2rem; margin-bottom: 3rem; }
    .input-area { display: flex; gap: .6rem; padding: 1.4rem; border-bottom: 1px solid #f0f2f8; }
    .input-area input { flex: 1; border: 2px solid #e2e6f3; border-radius: 10px; padding: .7rem 1rem; font-size: 1rem; outline: none; }
    .btn-add { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 10px; padding: .7rem 1.2rem; cursor: pointer; }
    .stats { padding: .75rem 1.4rem; font-size: .82rem; color: #718096; border-bottom: 1px solid #f0f2f8; }
    #todo-list { list-style: none; }
    .todo-item { display: flex; align-items: center; gap: .9rem; padding: 1rem 1.4rem; border-bottom: 1px solid #f7f8fc; }
    .todo-text { flex: 1; color: #2d3748; }
    .btn-delete { background: none; border: none; cursor: pointer; color: #cbd5e0; }
  </style>
</head>
<body>
<header>
  <h1>✅ My Todos</h1>
</header>
<div class="card">
  <div class="input-area">
    <input id="new-todo" type="text" placeholder="What needs to be done?" />
    <button class="btn-add" id="btn-add">＋</button>
  </div>
  <div class="stats" id="stats" style="display:none"></div>
  <ul id="todo-list"></ul>
</div>
<script>
  const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
  async function loadTodos() {
    const res = await fetch(API_URL + '/todos');
    const todos = await res.json();
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    todos.forEach(t => {
      const li = document.createElement('li');
      li.className = 'todo-item';
      li.innerHTML = `<span class="todo-text">${t.title}</span><button class="btn-delete">Delete</button>`;
      list.appendChild(li);
    });
  }
  document.getElementById('btn-add').onclick = async () => {
    const input = document.getElementById('new-todo');
    if (!input.value.trim()) return;
    await fetch(API_URL + '/todos', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: input.value }) });
    input.value = '';
    loadTodos();
  };
  loadTodos();
</script>
</body>
</html>
